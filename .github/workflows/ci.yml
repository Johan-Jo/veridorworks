name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Verify site entrypoint
        run: test -f index.html && test -f privacy.html && test -f favicon.ico && test -f favicon.svg

      - name: Check required production links
        run: |
          grep -q 'https://veridorworks.com/' index.html
          grep -q 'https://disputedesk.app' index.html
          grep -q 'rel="canonical"' index.html

      - name: Verify contact API
        run: test -f api/contact.ts
